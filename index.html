<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Birthday Card</title>
        <!--Google Font-->
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
        <!--Stylesheet-->
        <link rel="stylesheet" href="style.css" />
        <!-- <script src="script.js"></script> -->
        <script src="script.js" defer></script>
    </head>
    <body>
        
        <div class="cassette">
            <a href="https://music.youtube.com/playlist?list=PLdNcEZTfnVYB2tFKEJLesmEP7RtDMSlvH&si=UBZzfRMN2ajO9-Ui" target="_blank">
                <img src="./image/cassette.png" alt="Cassette tape">
            </a>
        </div>

<button id="mute-btn">🔊</button>

<audio id="birthday-audio" loop>
    <source src="audio/birthday-audio.mp3" type="audio/mpeg">
</audio>

        <div id="balloon-container"></div>
            
        <div class="card">
            
            <div class="outside">
                <div class="front">
                    <p>Happy Birthday</p>
                    <div class="cake">
                        <div class="top-layer"></div>
                        <div class="middle-layer"></div>
                        <div class="bottom-layer"></div>
                        <!-- <div class="candle"></div> --> 
                    </div>

                    <div class="striped-number-two">2</div>
                    <div class="striped-number-nine">9</div>
                </div>
                <div class="back">
                    <div class="confetti-full">
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                            <div class="dot"></div><div class="dot"></div>
                        </div>

                </div>
            </div>
            <div class="inside">
 

                
                
                <p>Happy Birthday BeeGee!</p>
            </div>

        </div>
        
        
    </body>
</html>
